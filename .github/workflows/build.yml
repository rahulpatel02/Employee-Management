name: Build & Test CI Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ '17' ]
    
    steps:
    # Step 1: Checkout the code
    - name: Checkout Code
      uses: actions/checkout@v4
    
    # Step 2: Set up JDK
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    # Step 3: Display Java version
    - name: Display Java Version
      run: java -version
    
    # Step 4: Build with Maven
    - name: Build with Maven
      run: mvn clean install -DskipTests
    
    # Step 5: Run Tests
    - name: Run Tests
      run: mvn test
    
    # Step 6: Run SonarQube Code Analysis (Optional)
    - name: SonarQube Analysis
      run: mvn sonar:sonar -Dsonar.projectKey=employee-management -Dsonar.host.url=http://localhost:9000 -Dsonar.login=${{ secrets.SONAR_TOKEN }} || true
    
    # Step 7: Generate Test Report
    - name: Generate Test Report
      if: always()
      run: mvn surefire-report:report
    
    # Step 8: Upload Test Results
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: target/surefire-reports/
    
    # Step 9: Upload Coverage Report
    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: target/site/
    
    # Step 10: Build Success Notification
    - name: Build Success
      if: success()
      run: echo "✅ Build and Tests Passed Successfully!"
    
    # Step 11: Build Failure Notification
    - name: Build Failure
      if: failure()
      run: echo "❌ Build or Tests Failed!"

